services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-2}
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/buchi}
      THEDOGAPI_API_KEY: ${THEDOGAPI_API_KEY:-}
      MEDIA_ROOT: ${MEDIA_ROOT:-storage/pet_images}
      MEDIA_URL_BASE: ${MEDIA_URL_BASE:-/media/pet_images}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - pet_images:/app/storage/pet_images
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: buchi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buchi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  pet_images:
