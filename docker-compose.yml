services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-2}
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - pet_images:/app/storage/pet_images
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: buchi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buchi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  pet_images:
